<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Flash - Emulado com Ruffle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ruffle/0.2.0/ruffle.js"></script> <!-- Link do Ruffle -->
</head>
<body>
    <h1>Meu Jogo Flash</h1>
    <div id="flash-container">
        <script>
            var ruffle = window.RufflePlayer.newest();
            var container = document.getElementById("flash-container");
            var player = ruffle.createPlayer();
            container.appendChild(player);
            player.load("Puanli_Giydirme_21.swf");  // Substitua 'seu-jogo.swf' pelo nome do seu arquivo SWF
        </script>
    </div>
</body>
</html>
