<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Automatically loads Ruffle (no download required) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      height: 100%;
    }

    h1 {
      margin: 20px;
      font-size: 24px;
    }

    #game {
      position: relative;
      width: 680px; /* Original width */
      height: 600px; /* Original height */
      background-color: black;
      cursor: pointer; /* Shows that the game area is clickable */
    }

    /* Ensures the SWF content stays proportionate */
    #game iframe {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Keeps the aspect ratio of the game */
    }

    /* When the game is in fullscreen mode */
    #game.fullscreen iframe {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",  // Keeps original aspect ratio, no scaling
      letterbox: "off"   // Disables letterbox
    };

    // Append the player to the #game container
    document.getElementById("game").appendChild(player);

    // Ensure the player fits the container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");  // Your SWF file

    // Fullscreen functionality for the game container
    const gameContainer = document.getElementById("game");

    gameContainer.addEventListener("click", () => {
      if (gameContainer.requestFullscreen) {
        gameContainer.requestFullscreen(); // For modern browsers
        gameContainer.classList.add("fullscreen");  // Add fullscreen class to apply fullscreen styles
      } else if (gameContainer.mozRequestFullScreen) { // For Firefox
        gameContainer.mozRequestFullScreen();
        gameContainer.classList.add("fullscreen");
      } else if (gameContainer.webkitRequestFullscreen) { // For Chrome/Safari
        gameContainer.webkitRequestFullscreen();
        gameContainer.classList.add("fullscreen");
      } else if (gameContainer.msRequestFullscreen) { // For IE/Edge
        gameContainer.msRequestFullscreen();
        gameContainer.classList.add("fullscreen");
      }
    });
  });
</script>

</body>
</html>
