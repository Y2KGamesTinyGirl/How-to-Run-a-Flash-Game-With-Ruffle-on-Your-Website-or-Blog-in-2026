<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ícone Interativo - Rolar Ergaminho</title>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Estilo do ícone de rolar */
    #scroll-icon {
      width: 100px;
      height: 50px;
      background-color: #d9b68e; /* cor de papel ou pergaminho */
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-top: 50px;
    }

    #scroll-icon:after {
      content: '📜'; /* Ícone de pergaminho */
      font-size: 32px;
    }

    /* Estilo do conteúdo que vai se revelar */
    #scroll-content {
      display: none; /* Inicialmente escondido */
      width: 80%;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff4e1;
      border: 2px solid #d9b68e;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      height: 200px;
      font-size: 18px;
      overflow-y: auto;
    }

    /* Animação de rolar */
    .scroll-open {
      display: block;
      animation: openScroll 1s ease-in-out;
    }

    @keyframes openScroll {
      0% {
        transform: scaleY(0);
      }
      100% {
        transform: scaleY(1);
      }
    }
  </style>
</head>
<body>

  <div id="scroll-icon"></div> <!-- Ícone de Pergaminho -->
  
  <div id="scroll-content">
    <h2>Conteúdo do Pergaminho</h2>
    <p>Este é o conteúdo revelado ao clicar no ícone do pergaminho. Você pode adicionar mais texto ou até mesmo outros elementos interativos aqui!</p>
  </div>

  <script>
    // Seleciona o ícone e o conteúdo
    const scrollIcon = document.getElementById("scroll-icon");
    const scrollContent = document.getElementById("scroll-content");

    // Adiciona o evento de clique ao ícone
    scrollIcon.addEventListener("click", () => {
      // Se o conteúdo estiver oculto, mostramos e aplicamos a animação
      if (scrollContent.style.display === "none") {
        scrollContent.style.display = "block"; // Mostra o conteúdo
        scrollContent.classList.add("scroll-open"); // Aplica a animação de abertura
      } else {
        scrollContent.style.display = "none"; // Esconde o conteúdo
        scrollContent.classList.remove("scroll-open"); // Remove a animação de abertura
      }
    });
  </script>

</body>
</html>
