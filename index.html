<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fab3dd;
        }

        #game-container {
            width: 1024px;  /* Novo tamanho de largura */
            height: 768px;  /* Novo tamanho de altura */
            position: relative;
            top: 50px;
            left: 140px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <h1></h1>
    <div id="game-container"></div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            
            // Ajustando a largura e altura do player
            player.style.width = "800px";  // Novo tamanho de largura
            player.style.height = "800px";  // Novo tamanho de altura

            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");
        });
    </script>
</body>
</html>
