<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Automatically loads Ruffle (no download required) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <!-- Link to Google Fonts for Y2K style font and feminine font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet"> <!-- Feminine font -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      font-family: 'Press Start 2P', cursive; /* Y2K font */
    }

    h1 {
      margin: 20px;
      font-size: 30px;
      text-align: center;
    }

    /* Glass effect */
    #game {
      width: 680px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      border-radius: 18px;
      overflow: hidden;
      box-sizing: border-box;

      position: relative;
    }

    /* 🔷 PIXEL BORDER ANIMADA */
    #game::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 10px; /* grossura da borda pixel */

      /* camada de pixels (efeito quadriculado) */
      background: 
        linear-gradient(90deg, #ff7a00 50%, transparent 50%),
        linear-gradient(#ff7a00 50%, transparent 50%);
      background-size: 12px 12px;

      /* deixa só a borda aparecer */
      -webkit-mask: 
        linear-gradient(#000 0 0) content-box, 
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      border-radius: 18px;

      /* animação */
      animation: pixelGlow 1.2s linear infinite;

      opacity: 0.9;
      pointer-events: none;
    }

    /* ✨ animação de brilho pixel */
    @keyframes pixelGlow {
      0% {
        filter: brightness(1) saturate(1);
      }
      50% {
        filter: brightness(1.6) saturate(1.4);
      }
      100% {
        filter: brightness(1) saturate(1);
      }
    }

    /* Neon border effect */
    #game::after {
      content: "";
      position: absolute;
      inset: 0;
      padding: 8px;
      border: 4px solid #ff5e00;
      border-radius: 18px;

      /* Neon glow effect */
      box-shadow:
        0 0 15px #ff5e00,
        0 0 30px #ff5e00,
        0 0 45px #ff5e00;

      pointer-events: none;
      opacity: 0.8;
      animation: neonPulse 1.5s infinite alternate;
    }

    @keyframes neonPulse {
      0% {
        box-shadow:
          0 0 15px #ff5e00,
          0 0 30px #ff5e00,
          0 0 45px #ff5e00;
      }
      100% {
        box-shadow:
          0 0 30px #ff5e00,
          0 0 50px #ff5e00,
          0 0 75px #ff5e00;
      }
    }

    /* Style for the like button and counter */
    #like-button {
      position: fixed;
      left: 20px; /* Positioned on the left side of the screen */
      bottom: 20px; /* Distance from the bottom */
      background-color: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 50%;
      transition: background-color 0.3s;
    }

    #like-button:hover {
      background-color: rgba(255, 95, 95, 0.2);
    }

    #like-button:focus {
      outline: none;
    }

    #like-button span {
      font-size: 24px;  /* Smaller size for heart */
      margin-right: 5px; /* Space between heart emoji and number */
    }

    /* Like counter with the same font style as the text */
    #like-counter {
      font-size: 24px;  /* Adjusted to match the font size of the phrase */
      color: #ff5f5f;
      font-family: 'Dancing Script', cursive;  /* Feminine font */
    }

    /* Feminine font style for the text above the like button */
    #love-text {
      font-family: 'Dancing Script', cursive;
      font-size: 24px;
      color: #ff5f5f;
      position: fixed;
      left: 20px; /* Adjust to align on the left */
      bottom: 130px; /* Position the phrase above the like button */
      z-index: 2;
      transform: translateX(0); /* Keep the text aligned */
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<!-- Feminine text "I Love this Game" above the like button -->
<div id="love-text">I Love this Game</div>

<!-- Like button with heart emoji and counter -->
<button id="like-button">
  <span>❤️</span> <!-- Heart emoji -->
  <span id="like-counter">0</span> <!-- Like counter -->
</button>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",  // Keeps the original aspect ratio, no scaling
      letterbox: "off"   // Disables letterbox
    };

    // Append the player to the #game container
    document.getElementById("game").appendChild(player);

    // Ensure the player fits the container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");  // Your SWF file
  });

  // Like button functionality
  let likeCount = 0;

  // Handle Like button click
  document.getElementById("like-button").addEventListener("click", () => {
    likeCount++;
    document.getElementById("like-counter").textContent = likeCount; // Update the like count
  });
</script>

</body>
</html>
