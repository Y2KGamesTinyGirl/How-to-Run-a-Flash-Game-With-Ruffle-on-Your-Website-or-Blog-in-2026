<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden; /* remove scroll */
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 10px;
      font-size: 24px;
    }

    #game {
      width: 90vw;
      max-width: 680px;
      height: 90vh;
      max-height: 600px;
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",
      letterbox: "off"
    };

    document.getElementById("game").appendChild(player);

    // 🔥 agora o player se adapta ao container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");
  });
</script>

</body>
</html>
