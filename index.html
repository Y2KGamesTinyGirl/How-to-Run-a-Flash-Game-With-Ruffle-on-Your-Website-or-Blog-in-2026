<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Flash com Ruffle</title>
    <!-- Incluindo o Ruffle via CDN -->
    <script src="https://unpkg.com/ruffle-web@latest/ruffle.min.js"></script>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #game-container {
            width: 800px; /* Defina o tamanho do seu jogo aqui */
            margin: 20px auto;
            border: 2px solid #000;
        }
    </style>
</head>
<body>
    <h1>Jogo Flash com Ruffle</h1>
    <p>Carregando jogo...</p>
    
    <!-- Contêiner onde o jogo Flash será exibido -->
    <div id="game-container"></div> <!-- Aqui, o Ruffle irá injetar o player -->
    
    <script>
        // Inicializando o Ruffle e garantindo que o conteúdo será carregado
        const ruffle = window.RufflePlayer.newest();
        const container = document.getElementById("game-container");

        // Criando o player Ruffle e carregando o SWF
        const player = ruffle.createPlayer();
        container.appendChild(player);
        player.load("seu-jogo.swf"); // Substitua "seu-jogo.swf" pelo caminho do seu arquivo

        // Verifique se há algum erro no console
        player.onload = function() {
            console.log("Jogo carregado com sucesso!");
        }

        player.onerror = function(error) {
            console.log("Erro ao carregar o jogo:", error);
        }
    </script>
</body>
</html>
