<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flash Game with Ruffle</title>
    <!-- Include Ruffle -->
    <script src="https://unpkg.com/ruffle.js"></script>
</head>
<body>
    <h1>Gloomy Day</h1>
    <!-- Create the object to load the SWF game -->
    <div id="flash-game">
        <script>
            // Using Ruffle to load the SWF file
            window.addEventListener('load', function() {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                document.getElementById("flash-game").appendChild(player);
                player.load("Puanli_Giydirme_21.swf");  // Replace this with your actual SWF file name
            });
        </script>
    </div>
</body>
</html>
