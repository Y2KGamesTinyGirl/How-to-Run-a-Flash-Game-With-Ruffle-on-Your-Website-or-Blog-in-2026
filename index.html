<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fab3dd; /* Cor de fundo da página */
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            top: 50px;
            left: 140px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333; /* Cor do título */
        }

        /* Estilo do botão de likes */
        #like-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 10px 20px; /* Ajustei o tamanho do botão */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 28px; /* Diminuí o tamanho do emoji */
            color: #333;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        /* Estilo ao passar o mouse */
        #like-button:hover {
            background-color: rgba(255, 165, 0, 0.8);
            transform: translateX(-50%) scale(1.1);
        }

        #like-button:focus {
            outline: none;
        }

        #like-button span {
            font-size: 32px; /* Diminuí o tamanho do emoji */
        }

        /* Estilo do número de hibiscos */
        #hibiscus-count {
            font-weight: bold;
            font-size: 20px; /* Diminuí o tamanho do contador */
            color: #FF6347; /* Cor do hibisco */
        }

        /* Estilo da mensagem no bottom com animação */
        #message {
            position: absolute;
            bottom: -50px; /* Começa fora da tela */
            width: 100%;
            text-align: center;
            font-size: 20px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 10px;
            display: none; /* Inicialmente escondido */
            transform: translateY(50px); /* Efeito de deslocamento para a animação */
            opacity: 0;
            transition: all 0.5s ease-in-out;
        }

        /* Animação da mensagem */
        #message.show {
            bottom: 20px; /* Vai para a parte inferior */
            transform: translateY(0);
            opacity: 1; /* Aparece suavemente */
        }
    </style>
</head>
<body>
    <h1></h1>
    <div id="game-container"></div>

    <button id="like-button">
        <span>🍭</span><span id="hibiscus-count">0</span>
    </button>

    <div id="message">Hey, a lollipop, thank you!</div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");
        });

        // Função para o botão de "pirulito"
        let hibiscusCount = 0;
        const likeButton = document.getElementById("like-button");
        const hibiscusCountElement = document.getElementById("hibiscus-count");
        const messageElement = document.getElementById("message");

        likeButton.addEventListener("click", () => {
            hibiscusCount++;
            hibiscusCountElement.textContent = hibiscusCount; // Atualiza o contador

            // Exibe a mensagem com animação
            messageElement.classList.add("show");

            // Esconde a mensagem após 3 segundos
            setTimeout(() => {
                messageElement.classList.remove("show");
            }, 3000);
        });
    </script>
</body>
</html>
