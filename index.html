<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fab3dd; /* Cor de fundo da página */
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            top: 50px;
            left: 140px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333; /* Cor do título */
        }

        /* Estilo do contador de likes */
        #like-counter {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 24px;
            color: #333;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 5px;
            border-radius: 10px;
        }

        #like-counter span {
            font-size: 28px;
        }
    </style>
</head>
<body>
    <h1></h1>
    <div id="game-container"></div>
    <div id="like-counter">
        <span>🌺 0 Likes</span>
    </div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");

            // Simulação de contador de likes
            let likeCount = 0;
            const likeCounterElement = document.getElementById("like-counter");

            // Função para aumentar os likes
            setInterval(() => {
                likeCount++;
                likeCounterElement.innerHTML = `<span>🌺 ${likeCount} Likes</span>`;
            }, 1000); // Aumenta o contador a cada 1 segundo (simulação)
        });
    </script>
</body>
</html>
