<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pergaminho 3D Interativo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Contêiner que vai segurar o pergaminho */
    .scroll-container {
      perspective: 1000px; /* Definindo a perspectiva 3D */
    }

    /* O próprio pergaminho */
    .scroll {
      width: 300px;
      height: 150px;
      background: #d9b68e; /* Cor de pergaminho */
      border-radius: 10px;
      cursor: pointer;
      transform-style: preserve-3d;
      transform: rotateX(0);
      transition: transform 1s ease-in-out;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .scroll.open {
      transform: rotateX(90deg); /* Abra o pergaminho em 3D */
    }

    /* Parte da "rolagem" do pergaminho */
    .scroll:before {
      content: '📜';
      font-size: 80px;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Conteúdo que vai aparecer quando o pergaminho abrir */
    .content {
      display: none;
      padding: 20px;
      background-color: #fff4e1;
      border: 2px solid #d9b68e;
      border-radius: 10px;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow-y: scroll;
    }

    .scroll.open .content {
      display: block;
    }

  </style>
</head>
<body>

<div class="scroll-container">
  <div class="scroll" id="scroll">
    <div class="content">
      <h2>Conteúdo do Pergaminho</h2>
      <p>Este é o conteúdo que se revela quando o pergaminho é aberto. Aqui você pode colocar qualquer informação, imagem ou até outros tipos de conteúdo.</p>
    </div>
  </div>
</div>

<script>
  const scroll = document.getElementById("scroll");

  // Ao clicar no pergaminho, ele abre ou fecha com efeito 3D
  scroll.addEventListener("click", () => {
    scroll.classList.toggle("open");
  });
</script>

</body>
</html>
