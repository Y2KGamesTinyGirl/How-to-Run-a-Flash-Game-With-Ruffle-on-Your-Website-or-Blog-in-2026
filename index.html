<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Automatically loads Ruffle (no download required) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <!-- Link to Google Fonts for Y2K style font and feminine font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet"> <!-- Feminine font -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      font-family: 'Press Start 2P', cursive; /* Y2K font */
    }

    h1 {
      margin: 20px;
      font-size: 30px;
      text-align: center;
    }

    /* Glass effect with thicker orange border */
    #game-container {
      width: 680px;
      height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Glass effect */
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      /* Thicker border */
      border: 8px solid rgba(255, 122, 0, 0.75);
      border-radius: 22px;

      /* Glow effect */
      box-shadow:
        0 0 30px rgba(255, 122, 0, 0.45),
        0 0 60px rgba(255, 122, 0, 0.25),
        inset 0 0 14px rgba(255, 122, 0, 0.2);

      overflow: hidden;
      box-sizing: border-box;
      position: relative;
    }

    /* Fullscreen mode for the game */
    #game-container.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
    }

    /* Style for the like button and counter */
    #like-button {
      position: fixed;
      left: 20px;
      bottom: 20px;
      background-color: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 50%;
      transition: background-color 0.3s;
    }

    #like-button:hover {
      background-color: rgba(255, 95, 95, 0.2);
    }

    #like-button:focus {
      outline: none;
    }

    #like-button span {
      font-size: 24px;  /* Smaller size for heart */
      margin-right: 5px; /* Space between heart emoji and number */
    }

    /* Like counter with the same font style as the text */
    #like-counter {
      font-size: 24px;
      color: #ff5f5f;
      font-family: 'Dancing Script', cursive; /* Feminine font */
    }

    /* Feminine font style for the text above the like button */
    #love-text {
      font-family: 'Dancing Script', cursive;
      font-size: 24px;
      color: #ff5f5f;
      position: fixed;
      left: 20px;
      bottom: 130px; /* Position the phrase above the like button */
      z-index: 2;
      transform: translateX(0);
    }

    /* Style for fullscreen button */
    #fullscreen-button {
      position: fixed;
      right: 20px;
      bottom: 100px;
      background-color: rgba(255, 122, 0, 0.8);
      border: none;
      cursor: pointer;
      padding: 15px;
      border-radius: 5px;
      font-family: 'Press Start 2P', cursive;
      color: white;
      font-size: 18px;
    }

    #fullscreen-button:hover {
      background-color: rgba(255, 122, 0, 1);
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game-container">
  <div id="game"></div>
</div>

<!-- Feminine text "I Love this Game" above the like button -->
<div id="love-text">I Love this Game</div>

<!-- Like button with heart emoji and counter -->
<button id="like-button">
  <span>❤️</span> <!-- Heart emoji -->
  <span id="like-counter">0</span> <!-- Like counter -->
</button>

<!-- Fullscreen button -->
<button id="fullscreen-button">Go Fullscreen</button>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",  // Keeps the original aspect ratio, no scaling
      letterbox: "off"   // Disables letterbox
    };

    // Append the player to the #game container
    document.getElementById("game").appendChild(player);

    // Ensure the player fits the container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");  // Your SWF file
  });

  // Like button functionality
  let likeCount = 0;

  // Handle Like button click
  document.getElementById("like-button").addEventListener("click", () => {
    likeCount++;
    document.getElementById("like-counter").textContent = likeCount; // Update the like count
  });

  // Fullscreen toggle functionality
  document.getElementById("fullscreen-button").addEventListener("click", () => {
    const gameContainer = document.getElementById("game-container");
    
    if (!document.fullscreenElement) {
      gameContainer.requestFullscreen();  // Enter fullscreen
      gameContainer.classList.add('fullscreen');  // Make the container fullscreen
    } else {
      document.exitFullscreen();  // Exit fullscreen
      gameContainer.classList.remove('fullscreen');  // Remove fullscreen class
    }
  });

  // Adjust the game on fullscreen change
  document.addEventListener('fullscreenchange', () => {
    const gameContainer = document.getElementById("game-container");
    if (document.fullscreenElement) {
      // On fullscreen, resize the game container and the player
      gameContainer.style.width = "100vw"; // 100% of the viewport width
      gameContainer.style.height = "100vh"; // 100% of the viewport height
    } else {
      // When exiting fullscreen, reset the game container to its original size
      gameContainer.style.width = "680px";
      gameContainer.style.height = "600px";
    }
  });
</script>

</body>
</html>
