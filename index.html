<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Automatically loads Ruffle (no download required) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <!-- Link to Google Fonts for Y2K style font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      font-family: 'Press Start 2P', cursive; /* Y2K font */
    }

    h1 {
      margin: 20px;
      font-size: 30px;
      text-align: center;
    }

    #game {
      width: 680px;
      height: 600px;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Style for like button */
    #like-button {
      position: fixed;
      left: 20px; /* Positioned on the left side of the screen */
      bottom: 20px; /* Distance from the bottom */
      background-color: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 50%;
      transition: background-color 0.3s;
    }

    #like-button:hover {
      background-color: rgba(255, 95, 95, 0.2);
    }

    #like-button:focus {
      outline: none;
    }

    #like-button span {
      font-size: 40px;  /* Larger size for heart */
      margin-right: 10px; /* Add space between heart emoji and number */
    }

    /* Like counter with Y2K font style */
    #like-counter {
      font-size: 24px;
      color: #ff5f5f;
      font-family: 'Press Start 2P', cursive;  /* Y2K style font */
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<!-- Like button with heart emoji and counter -->
<button id="like-button">
  <span>❤️</span> <!-- Heart emoji -->
  <span id="like-counter">0</span> <!-- Like counter -->
</button>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",  // Keeps the original aspect ratio, no scaling
      letterbox: "off"   // Disables letterbox
    };

    // Append the player to the #game container
    document.getElementById("game").appendChild(player);

    // Ensure the player fits the container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");  // Your SWF file
  });

  // Like button functionality
  let likeCount = 0;

  // Handle Like button click
  document.getElementById("like-button").addEventListener("click", () => {
    likeCount++;
    document.getElementById("like-counter").textContent = likeCount; // Update the like count
  });
</script>

</body>
</html>
