<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Flash com Ruffle</title>
    <!-- Incluindo o Ruffle via CDN -->
    <script src="https://unpkg.com/ruffle-web@latest/ruffle.min.js"></script>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #game-container {
            width: 800px; /* Defina o tamanho do seu jogo aqui */
            margin: 20px auto;
            border: 2px solid #000;
        }
    </style>
</head>
<body>
    <h1>Jogo Flash</h1>
    <p>Carregando jogo...</p>
    
    <!-- Contêiner onde o jogo Flash será exibido -->
    <div id="game-container">
        <object data="Puanli_Giydirme_21.swf" type="application/x-shockwave-flash" width="800" height="600">
            <param name="movie" value="seu-jogo.swf" />
            <p>Seu navegador não suporta Flash. Utilize um navegador que suporte ou ative o Ruffle.</p>
        </object>
    </div>

    <script>
        // Inicialize o Ruffle emulador
        const ruffle = window.RufflePlayer.newest();
        const container = document.getElementById("game-container");

        // Carregar o jogo SWF
        const player = ruffle.createPlayer();
        container.appendChild(player);
        player.load("Puanli_Giydirme_21.swf");
    </script>
</body>
</html>
