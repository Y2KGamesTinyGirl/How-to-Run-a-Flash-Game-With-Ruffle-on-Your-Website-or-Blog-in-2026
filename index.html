<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo Flash com Like</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        /* Reset de margens e preenchimentos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;    /* Remove margens */
            padding: 0;   /* Remove preenchimento */
            height: 100%; /* Ocupa 100% da altura da janela */
            width: 100%;  /* Ocupa 100% da largura da janela */
            overflow: hidden; /* Remove barras de rolagem */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Tamanho da altura da janela */
            width: 100vw;  /* Tamanho da largura da janela */
            background-color: #fab3dd;
        }

        #game-container {
            width: 100%;     /* Ocupa 100% da largura da tela */
            height: 100%;    /* Ocupa 100% da altura da tela */
            max-width: 800px; /* Limita o tamanho máximo da largura */
            max-height: 600px; /* Limita o tamanho máximo da altura */
            position: relative;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }

        /* Estilo do botão de like */
        #like-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff;
            border: 2px solid #fab3dd;
            padding: 8px 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 26px;
            color: #333;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        #like-button:hover {
            background-color: rgba(255, 165, 0, 0.8);
            transform: translateX(-50%) scale(1.1);
        }

        #like-button:focus {
            outline: none;
        }

        #like-button span {
            font-size: 32px;
        }

        #like-count {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            font-size: 18px;
            color: #FF69B4;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <h1>Nome do Jogo</h1>
    <div id="game-container"></div>

    <button id="like-button">
        <span>🍭</span><span id="like-count">0</span>
    </button>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");
        });

        // Variáveis
        let likeCount = localStorage.getItem("likeCount") ? parseInt(localStorage.getItem("likeCount")) : 0;
        const likeButton = document.getElementById("like-button");
        const likeCountElement = document.getElementById("like-count");

        // Atualiza o contador de curtidas com o valor armazenado
        likeCountElement.textContent = likeCount;

        likeButton.addEventListener("click", () => {
            if (likeCount === 0) {
                likeCount++;
                localStorage.setItem("likeCount", likeCount); // Armazena a curtida
                likeCountElement.textContent = likeCount; // Atualiza o contador
                likeButton.disabled = true;
                likeButton.style.backgroundColor = "#D3D3D3"; // Indica que o botão foi clicado
                likeButton.style.cursor = "not-allowed"; // Desativa o botão
            }
        });
    </script>
</body>
</html>
