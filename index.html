<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title></title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fab3dd; /* Cor de fundo da página */
        }

        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            top: 50px;
            left: 140px;
            border: 10px solid rgba(255, 165, 0, 0.8); /* Borda laranja */
            border-radius: 15px; /* Borda arredondada */
            backdrop-filter: blur(10px); /* Efeito glass */
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.6); /* Sombras para dar o efeito "glass" */
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <h1></h1>
    <div id="game-container"></div>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            const container = document.getElementById("game-container");
            container.appendChild(player);

            player.load("Puanli_Giydirme_21.swf");
        });
    </script>
</body>
</html>
