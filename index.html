<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Carrega o Ruffle automaticamente (sem download) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #game {
      margin: 20px auto;
      width: 500px;
      height: 500px;
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<script>
  // Inicializa o Ruffle
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
  scale: "noscale",
  letterbox: "off"
};

    // coloca o player na tela
    document.getElementById("game").appendChild(player);

    // tamanho do jogo
    player.style.width = "500px";
    player.style.height = "500px";

    // 🔥 AQUI você coloca o nome do seu arquivo SWF
    player.load("Puanli_Giydirme_21.swf");
    parameters: {}
  });
</script>

</body>
</html>
