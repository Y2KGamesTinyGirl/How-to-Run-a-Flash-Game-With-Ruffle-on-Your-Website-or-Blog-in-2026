<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Jogo SWF</title>

  <!-- Ruffle carregado direto da internet -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    #game {
      margin: 20px auto;
      width: 800px;
      height: 600px;
    }
  </style>
</head>
<body>

<h1>Meu Jogo SWF</h1>

<div id="game"></div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    document.getElementById("game").appendChild(player);

    player.style.width = "800px";
    player.style.height = "600px";

    // nome do seu arquivo SWF (tem que estar no GitHub)
    player.load("papastacomia.swf");
  });
</script>

</body>
</html>
