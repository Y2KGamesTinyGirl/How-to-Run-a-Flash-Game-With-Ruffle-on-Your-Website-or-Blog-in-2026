<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>우울한 하루</title>

  <!-- Automatically loads Ruffle (no download required) -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;  /* Organize the layout in a vertical stack */
      justify-content: center;
      align-items: center;
      background: url('https://preview.colorkit.co/color/f28dcd.png?size=wallpaper&static=true') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
      font-size: 30px;  /* Increase font size for better visibility */
      text-align: center; /* Ensure the title is centered */
    }

    #game {
      width: 680px;  /* Set the width of the game */
      height: 600px; /* Set the height of the game */
      background-color: black; /* Add background color to game area */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Style for like button */
    #like-button {
      background-color: #ff5f5f;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 20px;
    }

    #like-button:hover {
      background-color: #ff3333;
    }

    #like-message {
      display: none;
      margin-top: 10px;
      font-size: 18px;
      color: #ff5f5f;
    }
  </style>
</head>

<body>

<h1>우울한 하루</h1>

<div id="game"></div>

<!-- Like button -->
<button id="like-button">👍 Like</button>
<!-- Message that appears when liked -->
<div id="like-message">Thanks for liking the game!</div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.config = {
      scale: "noscale",  // Keeps the original aspect ratio, no scaling
      letterbox: "off"   // Disables letterbox
    };

    // Append the player to the #game container
    document.getElementById("game").appendChild(player);

    // Ensure the player fits the container
    player.style.width = "100%";
    player.style.height = "100%";

    player.load("Puanli_Giydirme_21.swf");  // Your SWF file
  });

  // Handle Like button click
  document.getElementById("like-button").addEventListener("click", () => {
    // Show the like message when clicked
    const likeMessage = document.getElementById("like-message");
    likeMessage.style.display = "block";

    // Optionally, you can hide the button after click or change it to something else
    document.getElementById("like-button").style.display = "none";
  });
</script>

</body>
</html>
